name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm run audit

      - name: Check
        run: npm run check

  build:
    name: Build ${{ matrix.template }}
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        template:
          - basic-pubky-app
          - pubky-signer-app
          - vite-starter

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.template }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.template }}

      - name: Audit dependencies
        run: npm run audit
        working-directory: ${{ matrix.template }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.template }}
